<app-navbar></app-navbar>

<div class="container">
  @for (group of groups; track group) {
    <mat-card>
      <mat-card-header><mat-card-title>{{ group.name }}</mat-card-title></mat-card-header>
      <mat-card-content>
        <mat-nav-list>
          @for (route of group.paths; track route) {
            <a mat-list-item [routerLink]="route.path">
              {{ route.title }}
            </a>
          }
        </mat-nav-list>
      </mat-card-content>
    </mat-card>
  }
</div>
